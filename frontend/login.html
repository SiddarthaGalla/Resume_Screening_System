<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruiter Login</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="particles-js"></div>

<div class="auth-container">

<div class="auth-card">

<h2>Recruiter Login</h2>

<p class="auth-subtitle">Login to manage candidate screening</p>

<form>

<div class="input-box">
<input type="email" id="loginEmail" placeholder=" " required>
<label>Email Address</label>
</div>

<div class="input-box password-box">
<input type="password" id="loginPassword" placeholder=" " required>
<label>Password</label>
<span class="toggle-password" onclick="toggleLoginPassword()">👁</span>
</div>

<button type="button" class="auth-btn" onclick="loginUser()">Login</button>

<p class="auth-switch">
Don't have an account? <a href="signup.html">Sign Up</a>
</p>

</form>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
